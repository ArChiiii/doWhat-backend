version: '3.9'

services:
  # FastAPI Backend API
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: dowhat-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      - ./app:/app/app
      - ./scrapers:/app/scrapers
      - ./jobs:/app/jobs
      - ./tests:/app/tests
      - /app/app/__pycache__
    depends_on:
      - redis
    networks:
      - dowhat-network
    restart: "no"

  # Redis for caching and RQ job queue
  redis:
    image: redis:7-alpine
    container_name: dowhat-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - dowhat-network
    restart: no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

