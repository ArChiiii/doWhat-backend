[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
numReplicas = 1
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
healthcheckPath = "/health"
healthcheckTimeout = 100

# Main API Service
[[services]]
name = "api"
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4"

[services.healthcheck]
path = "/health"
timeout = 100

# RQ Worker Service
[[services]]
name = "worker"
startCommand = "python jobs/worker.py"

# RQ Scheduler Service
[[services]]
name = "scheduler"
startCommand = "python jobs/scheduler.py"

# Environment Variables (Reference - set in Railway dashboard)
# SUPABASE_URL
# SUPABASE_ANON_KEY
# SUPABASE_SERVICE_ROLE_KEY
# DATABASE_URL
# REDIS_URL
# JWT_SECRET_KEY
# CLOUDINARY_CLOUD_NAME
# CLOUDINARY_API_KEY
# CLOUDINARY_API_SECRET
# GOOGLE_MAPS_API_KEY
# EVENTBRITE_API_KEY
# OPENAI_API_KEY
# MIXPANEL_TOKEN
# SENTRY_DSN
# ENVIRONMENT=production
# DEBUG=false
# CORS_ORIGINS
# RATE_LIMIT_PER_MINUTE=100

